name: ADR lint

# Ported from docs/qm/project-seed/ci/adr-lint.yml (quaternionmedia/qm),
# path adjusted for this project's submodule mount point (docs/qm, not
# governance/qm).
#
# Enforces the decision-record-discipline record's squash rule: a
# pre-ratification ADR (adr/DRAFT-*.md) is rewritten in place as
# understanding changes and must never narrate its own revision history.
#
# Assumes the branch-per-project ADR model: this project's own adr/
# directory lives inside the docs/qm submodule, on this project's
# dedicated branch (project/codecartographer) - not in this repo's own
# working tree.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  adr-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: ADR draft vocabulary lint
        run: |
          offending=$(grep -lEi "previously|originally|earlier draft|re-review|renumber|retroactive|supersedes the .* (stance|finding)|\bcorrected\b" docs/qm/adr/DRAFT-*.md 2>/dev/null || true)
          if [ -n "$offending" ]; then
            echo "Pre-ratification ADRs must be squashed, not narrate their own revision history - found banned vocabulary in:"
            echo "$offending"
            exit 1
          fi
