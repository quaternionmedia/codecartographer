# C language lexicon — reserved words and operators arranged on a hierarchy
# of abstractions, from the machine up.
#
# This file is hand-authored reference data (Option A): an ontology *about*
# the C language, not something derived from parsing a C file. It is designed
# to also serve Option B (parser enrichment): when a real C parser lands in
# codecarto, each lexed token can be looked up by its `token` string to recover
# its `layer` and `group`, letting generated ASTs be colored/grouped by
# abstraction level. The `token` field is therefore the join key — keep it the
# exact source spelling.
#
# Layer ordinals run machine-facing (0) -> abstract (higher). They are shared
# conceptually across kinds but numbered independently per kind, since keywords
# and operators stratify differently.

language: c
display_name: "C"
# Standard each token first appears in. Tokens with no `since` are C89/C90.
standards: [c89, c99, c11, c23]

keywords:
  layers:
    - ordinal: 0
      name: "Storage & memory placement"
      gloss: >
        Where a value lives and who else may touch it. The most machine-facing
        keywords: they place storage rather than compute. volatile and restrict
        carry the most weight in systems code (MMIO/signals; no-alias promise).
      groups:
        - name: "storage class"
          tokens:
            - {token: auto}
            - {token: register}
            - {token: static}
            - {token: extern}
        - name: "access qualifier"
          tokens:
            - {token: volatile}
            - {token: restrict, since: c99}
            - {token: _Thread_local, since: c11}

    - ordinal: 1
      name: "Primitive types & type modifiers"
      gloss: >
        Names for sizes and interpretations of bit patterns. C's "portable
        assembly" character lives here; alignment/padding intuition is rooted
        in this layer.
      groups:
        - name: "core primitive"
          tokens:
            - {token: void}
            - {token: char}
            - {token: int}
            - {token: float}
            - {token: double}
        - name: "size/sign modifier"
          tokens:
            - {token: short}
            - {token: long}
            - {token: signed}
            - {token: unsigned}
        - name: "extended primitive"
          tokens:
            - {token: _Bool, since: c99}
            - {token: _Complex, since: c99}
            - {token: _Imaginary, since: c99}

    - ordinal: 2
      name: "Aggregate & user-defined types"
      gloss: >
        First real abstraction step: composing primitives into structure.
        union stays closest to the metal (byte reinterpretation); typedef is
        pure naming with no new machinery.
      groups:
        - name: "aggregate"
          tokens:
            - {token: struct}
            - {token: union}
            - {token: enum}
        - name: "alias"
          tokens:
            - {token: typedef}

    - ordinal: 3
      name: "Control flow"
      gloss: >
        Structured sequencing and branching — the layer most languages share.
        goto survives in real C mainly for centralized error-cleanup paths.
      groups:
        - name: "selection"
          tokens:
            - {token: if}
            - {token: else}
            - {token: switch}
            - {token: case}
            - {token: default}
        - name: "iteration"
          tokens:
            - {token: for}
            - {token: while}
            - {token: do}
        - name: "jump"
          tokens:
            - {token: break}
            - {token: continue}
            - {token: goto}
            - {token: return}

    - ordinal: 4
      name: "Compile-time reasoning & contracts"
      gloss: >
        Words that operate on the program's structure and guarantees rather
        than its runtime values. The most abstract keyword layer.
      groups:
        - name: "size & alignment"
          tokens:
            - {token: sizeof}
            - {token: _Alignof, since: c11}
            - {token: _Alignas, since: c11}
        - name: "static contract"
          tokens:
            - {token: _Static_assert, since: c11}
            - {token: _Generic, since: c11}
            - {token: _Noreturn, since: c11}
        - name: "optimization hint / immutability"
          tokens:
            - {token: inline, since: c99}
            - {token: const}

operators:
  layers:
    - ordinal: 0
      name: "Memory & address"
      gloss: >
        The pointer machine — the most C-specific operators. a[i] is sugar for
        *(a + i), which is why subscript lives here, not with arithmetic.
      groups:
        - name: "indirection & address"
          tokens:
            - {token: "&", role: "address-of"}
            - {token: "*", role: "dereference"}
        - name: "member & subscript"
          tokens:
            - {token: "[]", role: "subscript"}
            - {token: "->", role: "member via pointer"}
            - {token: ".", role: "member"}

    - ordinal: 1
      name: "Bitwise"
      gloss: >
        Values treated as bit vectors. Where flag masks, capability sets, and
        protocol headers get manipulated. & and * overload with layer 0 by
        context — a genuine bug source.
      groups:
        - name: "logical-bit"
          tokens:
            - {token: "&", role: "bitwise and"}
            - {token: "|", role: "bitwise or"}
            - {token: "^", role: "bitwise xor"}
            - {token: "~", role: "bitwise not"}
        - name: "shift"
          tokens:
            - {token: "<<", role: "left shift"}
            - {token: ">>", role: "right shift"}

    - ordinal: 2
      name: "Arithmetic"
      gloss: >
        Numeric computation. ++/-- carry the pre/post distinction and interact
        with pointers (*p++) deliberately.
      groups:
        - name: "binary arithmetic"
          tokens:
            - {token: "+", role: "add"}
            - {token: "-", role: "subtract"}
            - {token: "*", role: "multiply"}
            - {token: "/", role: "divide"}
            - {token: "%", role: "modulo"}
        - name: "unary step"
          tokens:
            - {token: "++", role: "increment"}
            - {token: "--", role: "decrement"}

    - ordinal: 3
      name: "Comparison & logic"
      gloss: >
        Producing truth values. && and || add short-circuit control-flow
        behavior, which is why they sit above pure arithmetic.
      groups:
        - name: "relational"
          tokens:
            - {token: "==", role: "equal"}
            - {token: "!=", role: "not equal"}
            - {token: "<", role: "less"}
            - {token: ">", role: "greater"}
            - {token: "<=", role: "less or equal"}
            - {token: ">=", role: "greater or equal"}
        - name: "short-circuit logic"
          tokens:
            - {token: "&&", role: "logical and"}
            - {token: "||", role: "logical or"}
            - {token: "!", role: "logical not"}

    - ordinal: 4
      name: "Assignment"
      gloss: >
        Computed values flowing back into layer-0 storage. Compound forms fuse
        an arithmetic/bitwise op with =.
      groups:
        - name: "simple"
          tokens:
            - {token: "=", role: "assign"}
        - name: "compound"
          tokens:
            - {token: "+=", role: "add-assign"}
            - {token: "-=", role: "sub-assign"}
            - {token: "*=", role: "mul-assign"}
            - {token: "/=", role: "div-assign"}
            - {token: "%=", role: "mod-assign"}
            - {token: "&=", role: "and-assign"}
            - {token: "|=", role: "or-assign"}
            - {token: "^=", role: "xor-assign"}
            - {token: "<<=", role: "lshift-assign"}
            - {token: ">>=", role: "rshift-assign"}

    - ordinal: 5
      name: "Selection & sequencing"
      gloss: >
        The most abstract operators — they sequence or select whole
        expressions. The cast (type) overrides the type system by fiat, which
        is why systems code is full of it and why it is dangerous.
      groups:
        - name: "expression control"
          tokens:
            - {token: "?:", role: "ternary"}
            - {token: ",", role: "comma sequence"}
        - name: "application & conversion"
          tokens:
            - {token: "()", role: "call"}
            - {token: "(type)", role: "cast"}
