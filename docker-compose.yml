version: '3.8'

services:
  mongodb:
    container_name: mongodb
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - db_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  codecarto:
    container_name: codecarto
    build:
      context: .
      dockerfile: ./codecarto/Dockerfile
      args:
        - CODECARTO_PATH=./codecarto
    ports:
      - '2020:2020'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - db_net

volumes:
  mongodb_data:

networks:
  db_net:
    driver: bridge
